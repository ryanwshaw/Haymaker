<svg width="420" height="480" viewBox="0 0 420 480" xmlns="http://www.w3.org/2000/svg">
  <title>HomeCourse Hero  Splash Screen Logo</title>

  <defs>
    <!-- ===================== BRAND COLORS ===================== -->
    <linearGradient id="s-leftHGrad" x1="70" y1="0" x2="210" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#80AA90"/>
      <stop offset="70%"  stop-color="#90A898"/>
      <stop offset="100%" stop-color="#8A9A90" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="s-rightHGrad" x1="210" y1="0" x2="360" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A89098" stop-opacity="0.55"/>
      <stop offset="30%"  stop-color="#BCA0AE"/>
      <stop offset="100%" stop-color="#CBA8B8"/>
    </linearGradient>
    <linearGradient id="s-poleGrad" x1="0" y1="20" x2="0" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E8C860"/>
      <stop offset="45%"  stop-color="#C8A030"/>
      <stop offset="100%" stop-color="#8A6818"/>
    </linearGradient>
    <linearGradient id="s-flagGrad" x1="213" y1="22" x2="260" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F0D468"/>
      <stop offset="50%"  stop-color="#D4AC2C"/>
      <stop offset="100%" stop-color="#A87E18"/>
    </linearGradient>
    <filter id="s-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0A1A10" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ======================== MONOGRAM MARK ======================== -->
  <!-- Centered at x=210 (middle of 420), scaled to ~270px tall -->
  <g id="s-monogram">
    <!-- Left H -->
    <text x="137" y="278"
      font-family="Georgia, 'Times New Roman', Palatino, serif"
      font-size="290" font-weight="bold"
      fill="url(#s-leftHGrad)" filter="url(#s-shadow)"
      text-anchor="middle">H</text>
    <!-- Right H -->
    <text x="287" y="278"
      font-family="Georgia, 'Times New Roman', Palatino, serif"
      font-size="290" font-weight="bold"
      fill="url(#s-rightHGrad)" filter="url(#s-shadow)"
      text-anchor="middle">H</text>

    <!-- Flagpole -->
    <rect x="208" y="20" width="6" height="268" rx="3" fill="url(#s-poleGrad)"/>
    <!-- Flag -->
    <path d="M 214,22 L 266,33 C 270,34.5 270,42 266,43.5 L 214,58 Z" fill="url(#s-flagGrad)"/>
    <path d="M 214,22 L 266,33 C 268,33.5 268.5,35 268,36 L 214,28 Z" fill="#F8E898" opacity="0.4"/>
    <!-- Pole cap -->
    <circle cx="211" cy="288" r="4.5" fill="#C8A030" opacity="0.6"/>

    <!-- Tracer arc -->
    <g fill="#C4A028" opacity="0.5">
      <circle cx="55"  cy="283" r="3.2"/>
      <circle cx="74"  cy="296" r="3.2"/>
      <circle cx="96"  cy="305" r="3.2"/>
      <circle cx="119" cy="310" r="3.2"/>
      <circle cx="143" cy="311" r="3.2"/>
      <circle cx="166" cy="307" r="3.2"/>
      <circle cx="188" cy="298" r="3.2"/>
      <circle cx="208" cy="286" r="3.2"/>
      <circle cx="228" cy="272" r="3.2"/>
      <circle cx="246" cy="255" r="3.2"/>
      <circle cx="262" cy="236" r="3.2"/>
      <circle cx="276" cy="214" r="3.2"/>
      <circle cx="287" cy="190" r="3.2"/>
      <circle cx="296" cy="165" r="3.2"/>
      <circle cx="301" cy="139" r="3.2"/>
      <circle cx="303" cy="113" r="3.2"/>
      <circle cx="301" cy="88"  r="3.2"/>
      <circle cx="296" cy="63"  r="3.2"/>
    </g>
  </g>

  <!-- ======================== BRAND TEXT ======================== -->
  <!-- Stacked below the monogram -->

  <!-- Thin gold divider line -->
  <line x1="110" y1="330" x2="310" y2="330" stroke="#C4A028" stroke-width="1" opacity="0.35"/>

  <!-- HOME COURSE -->
  <text x="210" y="370"
    font-family="Georgia, 'Playfair Display', 'Times New Roman', Palatino, serif"
    font-size="34" font-weight="900" letter-spacing="6"
    text-anchor="middle">
    <tspan fill="#FFFFFF">HOME</tspan><tspan fill="#CBA8B8">COURSE</tspan>
  </text>

  <!-- HERO -->
  <text x="210" y="410"
    font-family="Georgia, 'Playfair Display', 'Times New Roman', Palatino, serif"
    font-size="34" font-weight="900" letter-spacing="6"
    fill="#C4A028"
    text-anchor="middle">HERO</text>

  <!-- Tagline -->
  <text x="210" y="448"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11" font-weight="500" letter-spacing="4"
    fill="#90A898" opacity="0.5"
    text-anchor="middle">TRACK  ·  COMPETE  ·  IMPROVE</text>

</svg>
