<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <title>HomeCourse Hero  Website Brand Lockup</title>

  <defs>
    <!-- ===================== BRAND COLORS ===================== -->
    <linearGradient id="w-leftHGrad" x1="30" y1="0" x2="115" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#80AA90"/>
      <stop offset="70%"  stop-color="#90A898"/>
      <stop offset="100%" stop-color="#8A9A90" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="w-rightHGrad" x1="115" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A89098" stop-opacity="0.55"/>
      <stop offset="30%"  stop-color="#BCA0AE"/>
      <stop offset="100%" stop-color="#CBA8B8"/>
    </linearGradient>
    <linearGradient id="w-poleGrad" x1="0" y1="15" x2="0" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E8C860"/>
      <stop offset="45%"  stop-color="#C8A030"/>
      <stop offset="100%" stop-color="#8A6818"/>
    </linearGradient>
    <linearGradient id="w-flagGrad" x1="116" y1="14" x2="140" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F0D468"/>
      <stop offset="50%"  stop-color="#D4AC2C"/>
      <stop offset="100%" stop-color="#A87E18"/>
    </linearGradient>
    <filter id="w-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0A1A10" flood-opacity="0.35"/>
    </filter>

    <!-- Gold decorative line gradient -->
    <linearGradient id="w-lineGrad" x1="230" y1="100" x2="780" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C8A030" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#C8A030" stop-opacity="0.4"/>
      <stop offset="85%"  stop-color="#C8A030" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C8A030" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ======================== MONOGRAM MARK ======================== -->
  <!-- Centered at xH115, scaled to ~170px tall -->
  <g id="w-monogram" transform="translate(-5, 0)">
    <!-- Left H -->
    <text x="72" y="160"
      font-family="Georgia, 'Times New Roman', Palatino, serif"
      font-size="165" font-weight="bold"
      fill="url(#w-leftHGrad)" filter="url(#w-shadow)"
      text-anchor="middle">H</text>
    <!-- Right H -->
    <text x="157" y="160"
      font-family="Georgia, 'Times New Roman', Palatino, serif"
      font-size="165" font-weight="bold"
      fill="url(#w-rightHGrad)" filter="url(#w-shadow)"
      text-anchor="middle">H</text>

    <!-- Flagpole -->
    <rect x="111" y="14" width="4" height="155" rx="2" fill="url(#w-poleGrad)"/>
    <!-- Flag -->
    <path d="M 115,15 L 149,22 C 152,23 152,28 149,29 L 115,38 Z" fill="url(#w-flagGrad)"/>
    <path d="M 115,15 L 149,22 C 150,22.3 150.5,23 150,23.5 L 115,20 Z" fill="#F8E898" opacity="0.4"/>
    <!-- Pole cap -->
    <circle cx="113" cy="169" r="2.8" fill="#C8A030" opacity="0.6"/>

    <!-- Tracer arc (scaled down) -->
    <g fill="#C4A028" opacity="0.5">
      <circle cx="32"  cy="168" r="2"/>
      <circle cx="43"  cy="175" r="2"/>
      <circle cx="55"  cy="179" r="2"/>
      <circle cx="68"  cy="181" r="2"/>
      <circle cx="81"  cy="180" r="2"/>
      <circle cx="93"  cy="176" r="2"/>
      <circle cx="104" cy="170" r="2"/>
      <circle cx="115" cy="163" r="2"/>
      <circle cx="125" cy="154" r="2"/>
      <circle cx="135" cy="144" r="2"/>
      <circle cx="144" cy="132" r="2"/>
      <circle cx="151" cy="119" r="2"/>
      <circle cx="157" cy="105" r="2"/>
      <circle cx="161" cy="90"  r="2"/>
      <circle cx="163" cy="75"  r="2"/>
      <circle cx="163" cy="60"  r="2"/>
      <circle cx="161" cy="46"  r="2"/>
    </g>
  </g>

  <!-- ======================== TEXT LOCKUP ======================== -->
  <!-- Vertical stack: title + tagline, right of the monogram -->
  <g id="w-text" transform="translate(238, 0)">
    <!-- Brand name in two lines -->
    <text y="90"
      font-family="Georgia, 'Playfair Display', 'Times New Roman', Palatino, serif"
      font-size="50" font-weight="900" letter-spacing="5"
      text-anchor="start">
      <tspan fill="#5E876A">Home</tspan><tspan fill="#BCA0AE">Course</tspan>
    </text>
    <text y="140"
      font-family="Georgia, 'Playfair Display', 'Times New Roman', Palatino, serif"
      font-size="50" font-weight="900" letter-spacing="5"
      fill="#C4A028"
      text-anchor="start">Hero</text>

    <!-- Thin decorative line -->
    <line x1="0" y1="158" x2="300" y2="158" stroke="#C4A028" stroke-width="1" opacity="0.3"/>

    <!-- Tagline -->
    <text y="178"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="13" font-weight="500" letter-spacing="4"
      fill="#90A898" opacity="0.7"
      text-anchor="start">TRACK  ·  COMPETE  ·  IMPROVE</text>
  </g>

</svg>
